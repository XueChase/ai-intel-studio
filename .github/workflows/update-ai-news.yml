name: AI Intel Studio - Update Data Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 7

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare OPML (optional)
        env:
          FOLLOW_OPML_B64: ${{ secrets.FOLLOW_OPML_B64 }}
        run: |
          mkdir -p feeds
          if [ -n "$FOLLOW_OPML_B64" ]; then
            echo "$FOLLOW_OPML_B64" | base64 --decode > feeds/follow.opml
            echo "Loaded feeds/follow.opml from FOLLOW_OPML_B64 secret"
          else
            echo "No FOLLOW_OPML_B64 secret provided; RSS OPML is optional"
          fi

      - name: Update data
        run: pnpm run fetch

      - name: Commit and push changes
        run: |
          git add data/collected/latest-24h.json data/collected/latest-7d.json data/collected/archive.json data/collected/source-status.json data/collected/waytoagi-7d.json data/collected/title-zh-cache.json data/collected/opml-feeds.json data/backups/collected
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git config user.name "github-actions-bot"
            git config user.email "41898282+github-actions-bot@users.noreply.github.com"
            git commit -m "chore: update ai news snapshot"
            git push
          fi

      - name: Generate OPML JSON
        run: npx tsx src/generate-opml-json.ts

      - name: Sync latest data to ai-intel-studio/public/data
        run: ./scripts/sync-vite-public-data.sh full

      - name: Build ai-intel-studio
        env:
          GITHUB_PAGES: true
        run: |
          cd ai-intel-studio
          npm ci
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ai-intel-studio/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
