name: AI Intel Studio - Generate AI Analysis

on:
  workflow_dispatch:
  schedule:
    # 07:03 Asia/Shanghai = 23:03 UTC (previous day)
    - cron: "3 23 * * *"

permissions:
  contents: write

jobs:
  generate-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 7

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build analysis input (24h)
        run: pnpm run build:analysis-input

      - name: Generate AI analysis markdown (24h)
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: pnpm run generate:analysis

      - name: Sync analysis data to vite-js/public/data
        run: ./scripts/sync-vite-public-data.sh analysis-only

      - name: Commit and push analysis
        run: |
          git add data/ai-input/analysis-input-24h.json data/ai-output-md/ai-analysis-24h.md data/backups/ai-input data/backups/ai-output-md vite-js/public/data/ai-input/analysis-input-24h.json vite-js/public/data/ai-output-md/ai-analysis-24h.md
          if git diff --cached --quiet; then
            echo "No analysis changes to commit"
          else
            git config user.name "github-actions-bot"
            git config user.email "41898282+github-actions-bot@users.noreply.github.com"
            git commit -m "chore: update ai analysis md"
            git push
          fi
