name: Generate AI Analysis Only

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update AI News Snapshot"]
    types: [completed]

permissions:
  contents: write

jobs:
  generate-analysis:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 7

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate AI analysis HTML (24h)
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: pnpm run generate:analysis

      - name: Commit and push analysis
        run: |
          git add data/ai-analysis-24h.html
          if git diff --cached --quiet; then
            echo "No analysis changes to commit"
          else
            git config user.name "github-actions-bot"
            git config user.email "41898282+github-actions-bot@users.noreply.github.com"
            git commit -m "chore: update ai analysis html"
            git push
          fi
