name: AI Intel Studio - Generate AI Analysis

on:
  workflow_dispatch:
    inputs:
      max_events:
        description: "Maximum events to keep in analysis input"
        required: false
        default: "80"
      desc_fetch_max:
        description: "Max URL fetches for filling missing desc"
        required: false
        default: "80"
      desc_timeout_ms:
        description: "Timeout per URL fetch (ms)"
        required: false
        default: "10000"
      desc_concurrency:
        description: "Concurrent URL fetches for desc"
        required: false
        default: "4"
      deploy_pages:
        description: "Deploy GitHub Pages after analysis (manual only)"
        required: false
        default: "false"
  schedule:
    # 07:03 Asia/Shanghai = 23:03 UTC (previous day)
    - cron: "3 23 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "analysis-main"
  cancel-in-progress: false

jobs:
  generate-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 7

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build analysis input (24h)
        run: |
          pnpm run build:analysis-input -- \
            --max-events "${{ github.event.inputs.max_events || '80' }}" \
            --desc-fetch-max "${{ github.event.inputs.desc_fetch_max || '80' }}" \
            --desc-timeout-ms "${{ github.event.inputs.desc_timeout_ms || '10000' }}" \
            --desc-concurrency "${{ github.event.inputs.desc_concurrency || '4' }}"

      - name: Show desc quality stats
        run: |
          echo "=== desc fill stats ==="
          jq -r '(.top_events|length) as $n | ([.top_events[]|select((.desc//"")=="")]|length) as $e | "total=\($n) empty=\($e) filled=\($n-$e) fill_rate=\((($n-$e)*100/$n)|floor)%"' data/ai-input/analysis-input-24h.json
          echo "=== desc length stats ==="
          jq -r '[.top_events[] | (.desc // "") | length] | {min:min,max:max,avg:(add/length)}' data/ai-input/analysis-input-24h.json

      - name: Generate AI analysis markdown (24h)
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: pnpm run generate:analysis

      - name: Sync analysis data to ai-intel-studio/public/data
        run: ./scripts/sync-vite-public-data.sh analysis-only

      - name: Commit and push analysis
        run: |
          files=(
            data/ai-input/analysis-input-24h.json
            data/ai-output-md/ai-analysis-24h.md
            data/backups/ai-input
            data/backups/ai-output-md
            ai-intel-studio/public/data/ai-input/analysis-input-24h.json
            ai-intel-studio/public/data/ai-output-md/ai-analysis-24h.md
          )
          if [ -f data/collected/desc-cache.json ]; then
            files+=(data/collected/desc-cache.json)
          fi
          git add "${files[@]}"
          if git diff --cached --quiet; then
            echo "No analysis changes to commit"
          else
            git config user.name "github-actions-bot"
            git config user.email "41898282+github-actions-bot@users.noreply.github.com"
            git commit -m "chore: update ai analysis md"
            git pull --rebase origin main || { git rebase --abort; exit 1; }
            git push origin HEAD:main || {
              git pull --rebase origin main
              git push origin HEAD:main
            }
          fi

      - name: Build ai-intel-studio (optional)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_pages == 'true'
        env:
          GITHUB_PAGES: true
        run: |
          cd ai-intel-studio
          npm ci
          npm run build

      - name: Setup Pages (optional)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_pages == 'true'
        uses: actions/configure-pages@v4

      - name: Upload pages artifact (optional)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_pages == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ai-intel-studio/dist

      - name: Deploy to GitHub Pages (optional)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_pages == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
